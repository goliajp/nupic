name: release

# Triggered on `v*.*.*` tags pushed to master (the classic git-flow release
# path). No PR / push CI — tests live in `cargo test` and the post-commit
# hook keeps the local binary fresh.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            # native to ubuntu-latest — zigbuild's clang fails on libdeflate
            # AVX-512 intrinsics (evex512), so use cargo directly.
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            zigbuild: true
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install zig + cargo-zigbuild
        if: ${{ matrix.zigbuild }}
        run: |
          python3 -m pip install --user ziglang
          cargo install cargo-zigbuild --locked

      - name: Build (zigbuild)
        if: ${{ matrix.zigbuild }}
        run: cargo zigbuild --release --target ${{ matrix.target }} -p nupic-cli

      - name: Build (cargo)
        if: ${{ !matrix.zigbuild }}
        run: cargo build --release --target ${{ matrix.target }} -p nupic-cli

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          bin="nupic"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            bin="nupic.exe"
          fi
          name="nupic-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          src="target/${{ matrix.target }}/release/${bin}"
          test -f "${src}"
          if [[ "${{ matrix.archive }}" == "tar.gz" ]]; then
            tar -czf "dist/${name}.tar.gz" -C "target/${{ matrix.target }}/release" "${bin}"
          else
            # Windows runners have 7z preinstalled.
            7z a "dist/${name}.zip" "./${src}"
          fi
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nupic-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
